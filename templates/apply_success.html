<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidature reçue — AdsClass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-emerald-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-10 max-w-md w-full text-center shadow-2xl">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-emerald-600 text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Candidature reçue !</h1>
        <p class="text-gray-600 mb-6">Merci {{ nom }}, votre dossier a bien été enregistré.</p>
        <div class="bg-gray-50 rounded-xl p-4 mb-6">
            <p class="text-xs text-gray-500 uppercase tracking-wider">Référence dossier</p>
            <p class="text-xl font-mono font-bold text-indigo-600">{{ reference }}</p>
        </div>
        <p class="text-sm text-gray-500 mb-6">Notre équipe Admissions vous contactera sous 48h par email ou WhatsApp.</p>
        <a href="{{ url_for('login') }}" class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-indigo-700">
            Retour à l'accueil
        </a>
    </div>
</body>
</html>
