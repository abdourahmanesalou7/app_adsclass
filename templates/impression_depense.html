<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justificatif de Dépense #{{ depense.id }} - AdsClass</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .receipt-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: relative;
    }

    .receipt-header {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .receipt-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% { transform: translateX(0) translateY(0); }
      100% { transform: translateX(-50px) translateY(-50px); }
    }

    .header-content {
      position: relative;
      z-index: 2;
    }

    .logo-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .company-info h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .company-info p {
      font-size: 14px;
      opacity: 0.9;
    }

    .receipt-number {
      text-align: right;
      background: rgba(255, 255, 255, 0.2);
      padding: 15px 20px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }

    .receipt-number h2 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .receipt-number .number {
      font-size: 24px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
    }

    .receipt-body {
      padding: 40px;
    }

    .expense-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    .detail-section {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 12px;
      border-left: 4px solid #ef4444;
    }

    .detail-section h3 {
      color: #ef4444;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e9ecef;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 500;
      color: #6c757d;
    }

    .detail-value {
      font-weight: 600;
      color: #333;
    }

    .amount-section {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      margin: 30px 0;
      position: relative;
      overflow: hidden;
    }

    .amount-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M0,0 L100,100 M100,0 L0,100" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></svg>') repeat;
      opacity: 0.3;
    }

    .amount-content {
      position: relative;
      z-index: 2;
    }

    .amount-label {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .amount-value {
      font-size: 36px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      margin-bottom: 10px;
    }

    .amount-words {
      font-size: 14px;
      opacity: 0.8;
      font-style: italic;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff3cd;
      color: #856404;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      margin: 20px 0;
    }

    .signature-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 2px dashed #dee2e6;
    }

    .signature-box {
      text-align: center;
    }

    .signature-line {
      border-bottom: 2px solid #333;
      margin: 40px 0 10px 0;
      position: relative;
    }

    .signature-label {
      font-weight: 600;
      color: #6c757d;
    }

    .footer {
      background: #f8f9fa;
      padding: 25px 40px;
      border-top: 1px solid #dee2e6;
      text-align: center;
    }

    .footer-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 15px;
    }

    .contact-info {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #6c757d;
    }

    .security-features {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #dee2e6;
    }

    .security-code {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #adb5bd;
      letter-spacing: 2px;
    }

    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 120px;
      color: rgba(239, 68, 68, 0.05);
      font-weight: 900;
      z-index: 1;
      pointer-events: none;
    }

    /* Print Styles */
    @media print {
      body {
        background: white;
        padding: 0;
      }

      .receipt-container {
        box-shadow: none;
        border-radius: 0;
        max-width: none;
      }

      .no-print {
        display: none !important;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .expense-details {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .signature-section {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .footer-info {
        flex-direction: column;
        text-align: center;
      }

      .contact-info {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="receipt-container">
    <header class="flex justify-between mb-6">
      <h1 class="text-2xl font-bold text-red-700">🧾 Reçu de dépense</h1>
      <span class="text-sm text-gray-600">Date d’impression : {{ now.strftime('%d/%m/%Y %H:%M') }}</span>
    </header>

    <section>
      <p><strong>Date :</strong> {{ depense.date }}</p>
      <p><strong>Description :</strong> {{ depense.description }}</p>
      <p><strong>Montant :</strong> - {{ "{:,.0f}".format(depense.montant).replace(",", " ") }} FCFA</p>
    </section>

    <div class="mt-6 text-center no-print">
      <button onclick="window.print()"
              class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700 transition">
        🖨 Imprimer ce reçu
      </button>
    </div>
  </div>

  <script>
    // Security features
    document.addEventListener('DOMContentLoaded', function() {
      // Prevent right-click context menu
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // Prevent text selection
      document.addEventListener('selectstart', function(e) {
        e.preventDefault();
      });

      // Add print event listener
      window.addEventListener('beforeprint', function() {
        document.title = 'Justificatif de Dépense #{{ "%06d"|format(depense.id) }} - {{ depense.description[:30] }}...';
      });
    });
  </script>
</body>
</html>
