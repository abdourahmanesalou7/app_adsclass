<!-- 🌍 Sélecteur de Langue Professionnel -->
<div class="relative" id="language-selector">
    <!-- Bouton Principal -->
    <button id="current-language" 
            onclick="toggleLanguageDropdown()"
            class="flex items-center space-x-2 px-4 py-2.5 bg-white/80 backdrop-blur-lg rounded-xl border border-gray-200/50 hover:border-indigo-300 hover:shadow-lg transition-all duration-300 group">
        <span class="text-xl">🇫🇷</span>
        <span class="font-semibold text-gray-700 group-hover:text-indigo-600" data-i18n="common.language">Français</span>
        <i class="fas fa-chevron-down text-gray-400 group-hover:text-indigo-600 transition-transform duration-300" id="lang-chevron"></i>
    </button>

    <!-- Dropdown Menu -->
    <div id="language-dropdown" 
         class="hidden absolute top-full right-0 mt-2 w-72 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl border border-gray-200/50 overflow-hidden z-50 animate-slideDown">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 px-6 py-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                    <i class="fas fa-globe text-white text-xl"></i>
                </div>
                <div>
                    <h3 class="text-white font-bold text-lg" data-i18n="language.select_language">Choisir la langue</h3>
                    <p class="text-white/80 text-xs" data-i18n="language.subtitle">Select your preferred language</p>
                </div>
            </div>
        </div>

        <!-- Options de Langue -->
        <div class="p-3 space-y-2">
            
            <!-- Français -->
            <button data-lang="fr" 
                    class="lang-option w-full flex items-center space-x-4 p-4 rounded-xl border-2 border-transparent hover:border-indigo-300 hover:bg-indigo-50 transition-all duration-300 group">
                <span class="text-3xl">🇫🇷</span>
                <div class="flex-1 text-left">
                    <div class="font-bold text-gray-800 group-hover:text-indigo-600">Français</div>
                    <div class="text-xs text-gray-500">French</div>
                </div>
                <div class="lang-check hidden">
                    <i class="fas fa-check-circle text-indigo-600 text-xl"></i>
                </div>
            </button>

            <!-- English -->
            <button data-lang="en" 
                    class="lang-option w-full flex items-center space-x-4 p-4 rounded-xl border-2 border-transparent hover:border-indigo-300 hover:bg-indigo-50 transition-all duration-300 group">
                <span class="text-3xl">🇬🇧</span>
                <div class="flex-1 text-left">
                    <div class="font-bold text-gray-800 group-hover:text-indigo-600">English</div>
                    <div class="text-xs text-gray-500">Anglais</div>
                </div>
                <div class="lang-check hidden">
                    <i class="fas fa-check-circle text-indigo-600 text-xl"></i>
                </div>
            </button>

            <!-- العربية -->
            <button data-lang="ar" 
                    class="lang-option w-full flex items-center space-x-4 p-4 rounded-xl border-2 border-transparent hover:border-indigo-300 hover:bg-indigo-50 transition-all duration-300 group">
                <span class="text-3xl">🇸🇦</span>
                <div class="flex-1 text-left">
                    <div class="font-bold text-gray-800 group-hover:text-indigo-600">العربية</div>
                    <div class="text-xs text-gray-500">Arabic</div>
                </div>
                <div class="lang-check hidden">
                    <i class="fas fa-check-circle text-indigo-600 text-xl"></i>
                </div>
            </button>

        </div>

        <!-- Footer Info -->
        <div class="bg-gray-50 px-6 py-3 border-t border-gray-200">
            <div class="flex items-center justify-between text-xs text-gray-500">
                <span data-i18n="language.auto_save">Sauvegarde automatique</span>
                <i class="fas fa-check text-green-500"></i>
            </div>
        </div>

    </div>
</div>

<style>
/* Animation pour le dropdown */
@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-slideDown {
    animation: slideDown 0.3s ease-out;
}

/* Rotation du chevron */
#language-dropdown:not(.hidden) ~ #current-language #lang-chevron {
    transform: rotate(180deg);
}

/* Support RTL pour l'arabe */
[dir="rtl"] {
    direction: rtl;
}

[dir="rtl"] .space-x-2 > * + *,
[dir="rtl"] .space-x-3 > * + *,
[dir="rtl"] .space-x-4 > * + * {
    margin-left: 0;
    margin-right: 0.5rem;
}

/* Ajustements pour le mode RTL */
body.rtl {
    font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body.rtl .text-left {
    text-align: right;
}

body.rtl .text-right {
    text-align: left;
}
</style>

<script>
// Toggle du dropdown de langue
function toggleLanguageDropdown() {
    const dropdown = document.getElementById('language-dropdown');
    const chevron = document.getElementById('lang-chevron');
    
    if (dropdown.classList.contains('hidden')) {
        dropdown.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
    } else {
        dropdown.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
    }
}

// Fermer le dropdown en cliquant à l'extérieur
document.addEventListener('click', function(event) {
    const selector = document.getElementById('language-selector');
    const dropdown = document.getElementById('language-dropdown');
    
    if (selector && !selector.contains(event.target)) {
        dropdown?.classList.add('hidden');
        const chevron = document.getElementById('lang-chevron');
        if (chevron) chevron.style.transform = 'rotate(0deg)';
    }
});

// Mettre à jour l'affichage de la langue sélectionnée
window.addEventListener('languageChanged', function(e) {
    const lang = e.detail.lang;
    
    // Mettre à jour les checkmarks
    document.querySelectorAll('.lang-option').forEach(option => {
        const check = option.querySelector('.lang-check');
        if (option.getAttribute('data-lang') === lang) {
            check?.classList.remove('hidden');
            option.classList.add('bg-indigo-50', 'border-indigo-300');
        } else {
            check?.classList.add('hidden');
            option.classList.remove('bg-indigo-50', 'border-indigo-300');
        }
    });
    
    // Fermer le dropdown
    document.getElementById('language-dropdown')?.classList.add('hidden');
});
</script>
