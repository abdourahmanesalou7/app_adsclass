<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR Code d'Entrée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .success-animation {
            animation: successPulse 0.5s ease-in-out;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="glass-effect rounded-2xl p-6 mb-6 shadow-2xl slide-in">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-qrcode text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Scanner QR Code</h1>
                        <p class="text-gray-600">Marquez votre présence</p>
                    </div>
                </div>
                <a href="{{ url_for('student_dashboard') }}" class="text-gray-600 hover:text-gray-800">
                    <i class="fas fa-times text-2xl"></i>
                </a>
            </div>
        </div>

        <!-- Instructions -->
        <div class="glass-effect rounded-2xl p-6 mb-6 shadow-2xl slide-in">
            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <i class="fas fa-info-circle text-blue-500 mr-2"></i>
                Comment ça marche ?
            </h3>
            <ol class="space-y-3 text-gray-700">
                <li class="flex items-start">
                    <span class="font-bold text-indigo-600 mr-3">1.</span>
                    <span>Cliquez sur "Démarrer le scan"</span>
                </li>
                <li class="flex items-start">
                    <span class="font-bold text-indigo-600 mr-3">2.</span>
                    <span>Autorisez l'accès à la caméra</span>
                </li>
                <li class="flex items-start">
                    <span class="font-bold text-indigo-600 mr-3">3.</span>
                    <span>Scannez le QR code affiché à l'entrée de la classe</span>
                </li>
                <li class="flex items-start">
                    <span class="font-bold text-indigo-600 mr-3">4.</span>
                    <span>Votre présence sera enregistrée automatiquement ✅</span>
                </li>
            </ol>
        </div>

        <!-- Scanner -->
        <div class="glass-effect rounded-2xl p-6 mb-6 shadow-2xl slide-in">
            <h3 class="text-lg font-bold text-gray-800 mb-4">
                <i class="fas fa-camera text-purple-600 mr-2"></i>
                Caméra
            </h3>
            <div id="reader" class="w-full rounded-xl overflow-hidden"></div>
            <div class="mt-4 flex items-center justify-center space-x-4">
                <button id="startBtn" onclick="startScanning()" 
                        class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white px-8 py-4 rounded-xl font-semibold transition-all shadow-lg text-lg">
                    <i class="fas fa-play mr-2"></i>Démarrer le scan
                </button>
                <button id="stopBtn" onclick="stopScanning()" style="display: none;"
                        class="bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white px-8 py-4 rounded-xl font-semibold transition-all shadow-lg text-lg">
                    <i class="fas fa-stop mr-2"></i>Arrêter
                </button>
            </div>
        </div>

        <!-- Result -->
        <div id="result" class="hidden glass-effect rounded-2xl p-6 shadow-2xl slide-in">
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        let html5QrcodeScanner = null;

        function startScanning() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';

            html5QrcodeScanner = new Html5Qrcode("reader");

            html5QrcodeScanner.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                onScanSuccess,
                onScanError
            ).catch(err => {
                console.error("Erreur démarrage scanner:", err);
                alert("Impossible d'accéder à la caméra. Vérifiez les permissions.");
                stopScanning();
            });
        }

        function stopScanning() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                    document.getElementById('startBtn').style.display = 'inline-block';
                    document.getElementById('stopBtn').style.display = 'none';
                }).catch(err => {
                    console.error("Erreur arrêt scanner:", err);
                    html5QrcodeScanner = null;
                    document.getElementById('startBtn').style.display = 'inline-block';
                    document.getElementById('stopBtn').style.display = 'none';
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Arrêter le scan
            stopScanning();

            try {
                const qrData = JSON.parse(decodedText);

                // Vérifier que c'est un QR code d'entrée de cours
                if (qrData.type !== 'course_entrance') {
                    showError("❌ Ce n'est pas un QR code d'entrée de cours valide.");
                    return;
                }

                // Afficher les informations du cours avant de marquer la présence
                showCourseInfo(qrData);

                // Marquer la présence
                markPresence(qrData);

            } catch (e) {
                console.error("Erreur parsing QR:", e);
                showError("❌ QR code invalide. Veuillez scanner le QR code affiché à l'entrée de la classe.");
            }
        }

        function showCourseInfo(qrData) {
            // Afficher les informations du cours scanné
            console.log("📚 Cours scanné:", {
                nom: qrData.course_name,
                professeur: qrData.professeur,
                salle: qrData.salle,
                horaire: `${qrData.heure_debut} - ${qrData.heure_fin}`,
                date: qrData.date
            });
        }

        function onScanError(error) {
            // Ignorer les erreurs de scan (trop fréquentes)
        }

        function markPresence(qrData) {
            showLoading();

            fetch('/api/mark-presence-entrance', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ qr_data: qrData })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showSuccess(data);
                } else {
                    showError(data.message);
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                showError("Erreur lors de l'enregistrement de la présence.");
            });
        }

        function showLoading() {
            const resultDiv = document.getElementById('result');
            const contentDiv = document.getElementById('resultContent');

            contentDiv.innerHTML = `
                <div class="text-center">
                    <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-indigo-600 mx-auto mb-4"></div>
                    <p class="text-gray-700 font-semibold">Enregistrement en cours...</p>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        function showSuccess(data) {
            const resultDiv = document.getElementById('result');
            const contentDiv = document.getElementById('resultContent');

            contentDiv.innerHTML = `
                <div class="text-center success-animation">
                    <div class="w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-check text-white text-4xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-green-600 mb-2">✅ Présence Enregistrée !</h3>
                    <p class="text-gray-700 mb-4">${data.message}</p>

                    ${data.course_info ? `
                        <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg p-4 mb-4 border border-blue-200">
                            <p class="text-xs text-gray-500 mb-2">📚 COURS</p>
                            <p class="font-bold text-gray-800 text-lg mb-2">${data.course_info.nom}</p>
                            <div class="grid grid-cols-2 gap-2 text-sm">
                                <div>
                                    <p class="text-gray-600">👨‍🏫 Professeur</p>
                                    <p class="font-semibold">${data.course_info.professeur}</p>
                                </div>
                                <div>
                                    <p class="text-gray-600">🚪 Salle</p>
                                    <p class="font-semibold">${data.course_info.salle}</p>
                                </div>
                                <div>
                                    <p class="text-gray-600">⏰ Horaire</p>
                                    <p class="font-semibold">${data.course_info.heure_debut} - ${data.course_info.heure_fin}</p>
                                </div>
                                <div>
                                    <p class="text-gray-600">📅 Date</p>
                                    <p class="font-semibold">${data.course_info.date}</p>
                                </div>
                            </div>
                        </div>
                    ` : data.course ? `
                        <div class="bg-blue-50 rounded-lg p-4 mb-4">
                            <p class="text-sm text-gray-600 mb-1">Cours</p>
                            <p class="font-bold text-gray-800">${data.course}</p>
                        </div>
                    ` : ''}

                    ${data.student ? `
                        <div class="bg-purple-50 rounded-lg p-4 mb-4">
                            <p class="text-sm text-gray-600 mb-1">👤 Étudiant</p>
                            <p class="font-bold text-gray-800">${data.student.prenom} ${data.student.nom}</p>
                            <p class="text-sm text-gray-600">${data.student.filiere} - ${data.student.niveau}</p>
                        </div>
                    ` : ''}
                    <button onclick="scanAgain()" class="bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-lg mt-4">
                        <i class="fas fa-redo mr-2"></i>Scanner un autre cours
                    </button>
                    <a href="{{ url_for('student_dashboard') }}" class="block mt-4 text-gray-600 hover:text-gray-800">
                        <i class="fas fa-home mr-2"></i>Retour au dashboard
                    </a>
                </div>
            `;
            resultDiv.classList.remove('hidden');

            // Son de succès
            playSuccessSound();
        }

        function showError(message) {
            const resultDiv = document.getElementById('result');
            const contentDiv = document.getElementById('resultContent');

            contentDiv.innerHTML = `
                <div class="text-center">
                    <div class="w-20 h-20 bg-gradient-to-br from-red-500 to-pink-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-times text-white text-4xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-red-600 mb-2">Erreur</h3>
                    <p class="text-gray-700 mb-4">${message}</p>
                    <button onclick="scanAgain()" class="bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-lg">
                        <i class="fas fa-redo mr-2"></i>Réessayer
                    </button>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        function scanAgain() {
            document.getElementById('result').classList.add('hidden');
            startScanning();
        }

        function playSuccessSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.2);
            } catch (e) {
                console.log("Son non disponible");
            }
        }
    </script>
</body>
</html>
